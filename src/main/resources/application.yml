spring:
  application:
    name: ms-notificaciones

  # ─── Perfil activo por defecto ───
  profiles:
    active: local

  # ─── Configuración por defecto (perfil local: MariaDB 11.8) ───
  datasource:
    url: jdbc:mariadb://localhost:3306/perfulandia_notificaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Inicialización SQL (seed data) — ejecutar DESPUÉS de que Hibernate cree las tablas
  sql:
    init:
      mode: always

  # ─── Configuración de correo (valores dummy para desarrollo académico) ───
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: dummy-username
    password: dummy-password
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 2000
      mail.smtp.timeout: 2000
      mail.smtp.writetimeout: 2000
      mail.debug: false

# ─── Puerto del servidor ───
server:
  port: 8089

# ─── Actuator ───
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # desactivado para entorno académico con SMTP dummy

# ─── Springdoc OpenAPI ───
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ═══════════════════════════════════════════════════════════
# Perfil DUOC (MySQL 8.x — ddl-auto=update)
# ═══════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: duoc

  datasource:
    url: jdbc:mysql://localhost:3306/perfulandia_notificaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
