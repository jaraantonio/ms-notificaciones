spring:
  application:
    name: ms-notificaciones

  datasource:
    url: jdbc:mysql://localhost:3306/perfulandia_notificaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: dummy-username
    password: dummy-password
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 2000
      mail.smtp.timeout: 2000
      mail.smtp.writetimeout: 2000
      mail.debug: false

server:
  port: 8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
